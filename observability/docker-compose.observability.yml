# L9 Observability Stack
# Grafana :3000  |  Prometheus :9090  |  Tempo :3200  |  OTel Collector :4317/:4318
# Usage: make obs-up / make obs-down

networks:
  obs:
    driver: bridge

volumes:
  grafana-data:
  prometheus-data:
  tempo-data:

services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.110.0
    container_name: l9-otel-collector
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8888:8888"
    networks: [obs]
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: l9-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-remote-write-receiver"
      - "--enable-feature=exemplar-storage"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks: [obs]
    restart: unless-stopped

  tempo:
    image: grafana/tempo:2.6.0
    container_name: l9-tempo
    command: ["-config.file=/etc/tempo/config.yaml"]
    volumes:
      - ./tempo-config.yaml:/etc/tempo/config.yaml:ro
      - tempo-data:/tmp/tempo
    ports:
      - "3200:3200"
      - "9095:9095"
    networks: [obs]
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.3.0
    container_name: l9-grafana
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
      - GF_FEATURE_TOGGLES_ENABLE=traceqlEditor
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    networks: [obs]
    depends_on: [prometheus, tempo]
    restart: unless-stopped
