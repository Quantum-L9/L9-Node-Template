name: Dependency Review
on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: deps-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        continue-on-error: true
